services:
  # ===========================================================================
  # INFRASTRUCTURE SERVICES
  # ===========================================================================

  postgres:
    image: postgres:15.8-alpine
    container_name: laias-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: laias
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-laias_dev_password}
      POSTGRES_DB: laias
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_backups:/backups
    ports:
      - "${POSTGRES_PORT:-127.0.0.1:5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laias"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - laias-network

  redis:
    image: redis:7.4-alpine
    container_name: laias-redis
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-laias_redis_dev}
    volumes:
      - redis_data:/data
      - ./infrastructure/redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_PORT:-127.0.0.1:6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-laias_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "25m"
        max-file: "3"
    networks:
      - laias-network

  # ===========================================================================
  # AGENT RUNNER BASE IMAGE
  # Build once, used for all agent deployments
  # ===========================================================================

  agent-runner:
    build:
      context: .
      dockerfile: Dockerfile.agent-runner
    image: laias/agent-runner:latest
    restart: unless-stopped
    profiles:
      - build-only  # Only used for building, not running
    networks:
      - laias-network

  # ===========================================================================
  # BACKEND SERVICES
  # ===========================================================================

  agent-generator:
    build:
      context: ./services/agent-generator
      dockerfile: Dockerfile
    image: laias/agent-generator:latest
    container_name: laias-agent-generator
    restart: unless-stopped
    ports:
      - "4521:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://laias:${POSTGRES_PASSWORD:-laias_dev_password}@postgres:5432/laias
      - REDIS_URL=redis://:${REDIS_PASSWORD:-laias_redis_dev}@redis:6379/0
      # CORS Configuration
      - ALLOWED_ORIGINS=["http://localhost:4527", "http://localhost:4528", "https://laias-studio.ngrok-free.app", "https://laias-api.ngrok-free.app"]
      # LLM Provider API Keys
      - ZAI_API_KEY=${ZAI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PORTKEY_API_KEY=${PORTKEY_API_KEY}
      # Composio Integration
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY}
      - COMPOSIO_BASE_URL=${COMPOSIO_BASE_URL}
      - COMPOSIO_ACCESS_TOKEN=${COMPOSIO_ACCESS_TOKEN}
      # Service Configuration
      - LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-zai}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-glm-5}
      - SERVICE_PORT=4521
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TEMPLATES_DIR=/app/templates/presets
      # Internal service-to-service URL (Docker DNS, not localhost)
      - DOCKER_ORCHESTRATOR_URL=http://docker-orchestrator:8002
    volumes:
      - ./templates/presets:/app/templates/presets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - laias-network

  docker-orchestrator:
    build:
      context: ./services/docker-orchestrator
      dockerfile: Dockerfile
    image: laias/docker-orchestrator:latest
    container_name: laias-docker-orchestrator
    restart: unless-stopped
    ports:
      - "4522:8002"
    environment:
      - DATABASE_URL=postgresql+asyncpg://laias:${POSTGRES_PASSWORD:-laias_dev_password}@postgres:5432/laias
      - REDIS_URL=redis://:${REDIS_PASSWORD:-laias_redis_dev}@redis:6379/1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AGENT_IMAGE_BASE=laias/agent-runner:latest
      - AGENT_CODE_PATH=/var/laias/agents
      - FILESYSTEM_BROWSE_ROOT=/var/laias/outputs
      - SERVICE_PORT=4522
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # CORS Configuration
      - CORS_ORIGINS=["http://localhost:4527", "http://localhost:4528", "https://laias-studio.ngrok-free.app", "https://laias-api.ngrok-free.app"]
    volumes:
      # CRITICAL: Access host Docker socket for sibling container spawning
      - /var/run/docker.sock:/var/run/docker.sock
      # Store generated agent code (mounted into spawned containers)
      - agent_code:/var/laias/agents
      # Store agent execution outputs (persistent across container recreates)
      - agent_outputs:/var/laias/outputs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - laias-network

  # ===========================================================================
  # FRONTEND SERVICES
  # ===========================================================================

  studio-ui:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: studio-ui/Dockerfile
      args:
        - NEXT_PUBLIC_AGENT_GENERATOR_URL=http://localhost:4521
        - NEXT_PUBLIC_DOCKER_ORCHESTRATOR_URL=http://localhost:4522
    image: laias/studio-ui:latest
    container_name: laias-studio-ui
    ports:
      - "4527:3000"
    environment:
      # NOTE: NEXT_PUBLIC_ vars are baked into client-side JS at build time
      # Browser needs localhost URLs, not Docker internal network names
      - NEXT_PUBLIC_AGENT_GENERATOR_URL=http://localhost:4521
      - NEXT_PUBLIC_DOCKER_ORCHESTRATOR_URL=http://localhost:4522
    depends_on:
      agent-generator:
        condition: service_healthy
      docker-orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "25m"
        max-file: "3"
    networks:
      - laias-network

  control-room:
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: control-room/Dockerfile
      args:
        - NEXT_PUBLIC_DOCKER_ORCHESTRATOR_URL=http://localhost:4522
    image: laias/control-room:latest
    container_name: laias-control-room
    ports:
      - "4528:3001"
    environment:
      # NOTE: NEXT_PUBLIC_ vars are baked into client-side JS at build time
      # Browser needs localhost URLs, not Docker internal network names
      - NEXT_PUBLIC_DOCKER_ORCHESTRATOR_URL=http://localhost:4522
    depends_on:
      docker-orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "25m"
        max-file: "3"
    networks:
      - laias-network

networks:
  laias-network:
    driver: bridge
    name: laias-network

volumes:
  postgres_data:
    name: laias-postgres-data
  postgres_backups:
    name: laias-postgres-backups
  redis_data:
    name: laias-redis-data
  agent_code:
    name: laias-agent-code
  agent_outputs:
    name: laias-agent-outputs
