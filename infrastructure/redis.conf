# =============================================================================
# LAIAS Redis Configuration
# =============================================================================

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence - AOF (Append Only File)
appendonly yes
appendfsync everysec

# RDB snapshots for additional durability
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
logfile ""

# Connection management
tcp-keepalive 300
timeout 300
maxclients 1000

# Pub/Sub for real-time updates
notify-keyspace-events Ex
