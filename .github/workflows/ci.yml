name: LAIAS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-agent-generator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/agent-generator

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest -v

  test-docker-orchestrator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/docker-orchestrator

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff
        run: ruff check services/

      - name: Run mypy (agent-generator)
        run: mypy services/agent-generator/app --ignore-missing-imports
        continue-on-error: true  # Allow failures during gradual adoption

      - name: Run mypy (docker-orchestrator)
        run: mypy services/docker-orchestrator/app --ignore-missing-imports
        continue-on-error: true  # Allow failures during gradual adoption

  # =============================================================================
  # FRONTEND CHECKS
  # =============================================================================

  frontend-studio-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/studio-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/studio-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  frontend-control-room:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/control-room
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/control-room/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # =============================================================================
  # DOCKER BUILD
  # =============================================================================

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-agent-generator, test-docker-orchestrator, frontend-studio-ui, frontend-control-room]
    steps:
      - uses: actions/checkout@v4

      - name: Build Agent Generator image
        run: docker build -t laias/agent-generator:ci services/agent-generator/

      - name: Build Docker Orchestrator image
        run: docker build -t laias/docker-orchestrator:ci services/docker-orchestrator/

      - name: Build Agent Runner base image
        run: docker build -t laias/agent-runner:ci -f Dockerfile.agent-runner .
