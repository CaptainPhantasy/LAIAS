id: revenue_churn_predictor
name: Churn Risk Predictor
description: Identifies customers showing early churn signals by analyzing usage patterns, support ticket
  frequency, billing issues, and engagement decline. Scores each account by churn probability and recommends
  intervention actions to retain them.
category: revenue_growth
tags:
- churn
- retention
- prediction
- risk
- customers
default_complexity: moderate
default_tools:
- CSVSearchTool
- PandasTool
- FileReadTool
sample_prompts:
- Analyze our customer data and flag accounts likely to churn this month
- Which customers haven't logged in for 14+ days and have renewal coming up?
- Build a churn risk scorecard from our usage and billing data
suggested_config:
  llm_provider: openai
  model: gpt-4o
  include_memory: true
  include_analytics: true
  max_agents: 3
agent_structure:
  agents:
  - name: usage_analyzer
    role: Product Usage Analyst
    backstory: 'Identifies declining engagement patterns: login frequency drops, feature abandonment,
      and session duration decreases that precede cancellation.'
  - name: risk_scorer
    role: Churn Risk Modeler
    backstory: Builds composite churn risk scores using behavioral, financial, and sentiment signals.
      Categorizes accounts into risk tiers with confidence levels.
  - name: retention_strategist
    role: Customer Retention Specialist
    backstory: Designs targeted retention plays for each risk tier. Recommends specific outreach messages,
      discount offers, and feature highlights to re-engage at-risk accounts.
expected_outputs:
- Churn risk scorecard by account
- At-risk customer list with scores
- Retention playbook per risk tier
- Projected churn impact on MRR
output_config:
  format: csv
  destination: filesystem
  filename_pattern: churn_risk_{date}.csv
