id: revenue_cold_outreach_sequencer
name: Cold Outreach Sequence Builder
description: Crafts personalized cold email and LinkedIn outreach sequences for target prospects. Researches
  each prospect's company, role, and pain points to write multi-step sequences that feel human. Outputs
  ready-to-send message drafts with follow-up timing.
category: revenue_growth
tags:
- outreach
- email
- linkedin
- sales
- prospecting
default_complexity: moderate
default_tools:
- SerperDevTool
- ScrapeWebsiteTool
- EXASearchTool
sample_prompts:
- Write a 5-email cold outreach sequence for CTOs at Series A startups
- Create personalized LinkedIn messages for these 20 prospect companies
- Build an outreach campaign targeting HR directors at mid-market companies
suggested_config:
  llm_provider: openai
  model: gpt-4o
  include_memory: true
  include_analytics: true
  max_agents: 3
agent_structure:
  agents:
  - name: prospect_researcher
    role: Prospect Intelligence Analyst
    backstory: Expert at mining public data to build detailed prospect profiles. Identifies pain points,
      recent company news, and conversation hooks from LinkedIn, press releases, and job postings.
  - name: sequence_writer
    role: Outreach Copywriter
    backstory: Specializes in writing cold outreach that converts. Masters the balance between personalization
      and scalability, crafting messages that feel hand-written while following proven frameworks.
  - name: timing_optimizer
    role: Campaign Timing Strategist
    backstory: Analyzes response rate data to recommend optimal send times, follow-up intervals, and sequence
      length. Ensures maximum open and reply rates.
expected_outputs:
- Multi-step email sequence drafts
- LinkedIn message templates
- Prospect research briefs
- Send timing recommendations
output_config:
  format: markdown
  destination: filesystem
  filename_pattern: outreach_sequence_{date}.md
