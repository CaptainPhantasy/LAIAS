id: revenue_annual_contract_negotiator
name: Annual Contract Negotiation Prep
description: Prepares for annual contract negotiations by analyzing account usage history, calculating
  appropriate discount tiers for annual commitment, and drafting negotiation talking points that maximize
  contract value while retaining the customer.
category: revenue_growth
tags:
- contracts
- negotiation
- annual
- deals
- pricing
default_complexity: moderate
default_tools:
- CSVSearchTool
- FileReadTool
- PandasTool
sample_prompts:
- Prepare negotiation talking points for our top 10 accounts up for renewal
- What annual discount should I offer to convert monthly customers?
- Build a tiered discount structure for 1-year vs 2-year commitments
suggested_config:
  llm_provider: openai
  model: gpt-4o
  include_memory: true
  include_analytics: true
  max_agents: 3
agent_structure:
  agents:
  - name: account_analyst
    role: Account Value Analyst
    backstory: Calculates each account's lifetime value, usage trajectory, and strategic importance. Determines
      the maximum discount that preserves unit economics.
  - name: negotiation_prepper
    role: Negotiation Strategy Advisor
    backstory: Prepares negotiation strategies including BATNA analysis, concession planning, and walk-away
      points. Ensures the founder enters every negotiation prepared.
  - name: contract_drafter
    role: Contract Terms Writer
    backstory: Drafts contract terms, pricing tables, and SLA language. Creates clear, professional documents
      that protect both parties while closing the deal.
expected_outputs:
- Per-account negotiation briefs
- Discount tier framework
- Talking points and concession plan
- Draft contract terms
output_config:
  format: markdown
  destination: filesystem
  filename_pattern: contract_negotiation_{date}.md
