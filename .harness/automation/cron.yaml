# PEBKAC Harness Automation Configuration
# Auto-generated during unboxing

heartbeat:
  interval: "*/5 * * * *"
  script: heartbeat.sh
  script_windows: heartbeat.ps1
  description: "Check session health every 5 minutes"

checkpoint_backup:
  interval: "0 */1 * * *"
